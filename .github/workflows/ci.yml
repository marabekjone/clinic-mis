name: CI/CD - Clinic MIS

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install linters
        run: |
          pip install flake8 pylint black
      
      - name: Run black (code formatter check)
        run: black --check --diff *.py || true
      
      - name: Run flake8
        run: flake8 *.py --max-line-length=120 --ignore=E501,W503 || true

  # Job 2: Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short --cov=. --cov-report=xml
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Job 3: Start services for integration tests
  setup-services:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flask-cors
      
      - name: Start Module A
        run: |
          python module_a_simple.py &
          sleep 5
      
      - name: Start Module B
        run: |
          python module_b_appointments_medicines.py &
          sleep 5
      
      - name: Start Module C
        run: |
          python module_c_simple.py &
          sleep 5
      
      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v --tb=short
      
      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/ -v -s --tb=short

  # Job 4: Docker build
  docker-build:
    runs-on: ubuntu-latest
    needs: setup-services
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Module A Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.module_a
          load: true
          tags: clinic-module-a:latest
      
      - name: Build Module B Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.module_b
          load: true
          tags: clinic-module-b:latest
      
      - name: Build Module C Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.module_c
          load: true
          tags: clinic-module-c:latest
      
      - name: Verify Docker images
        run: docker images | grep clinic-module
