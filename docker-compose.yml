services:
  module-a:
    build:
      context: .
      dockerfile: Dockerfile.module_a
    container_name: clinic-module-a
    ports:
      - "5001:5001"
    networks:
      - clinic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  module-b:
    build:
      context: .
      dockerfile: Dockerfile.module_b
    container_name: clinic-module-b
    ports:
      - "5002:5002"
    networks:
      - clinic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/medicines"]
      interval: 10s
      timeout: 5s
      retries: 5

  module-c:
    build:
      context: .
      dockerfile: Dockerfile.module_c
    container_name: clinic-module-c
    ports:
      - "3000:3000"
    networks:
      - clinic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/invoices"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: clinic-frontend
    ports:
      - "8080:8080"
    networks:
      - clinic-network
    depends_on:
      - module-a
      - module-b
      - module-c
    restart: unless-stopped

networks:
  clinic-network:
    driver: bridge
